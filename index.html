<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Notes Portal</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2d3436;
            --accent: #0984e3;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .branch-card { background: var(--card-bg); padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sub-branch { margin-left: 30px; padding: 10px; border-left: 2px solid var(--accent); background: #fafafa; margin-top: 10px; display: flex; justify-content: space-between; }
        .controls { margin-bottom: 20px; background: white; padding: 20px; border-radius: 8px; }
        input[type="text"] { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { cursor: pointer; padding: 8px 15px; border: none; border-radius: 4px; background: var(--accent); color: white; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .global-tag { font-size: 0.7rem; background: #ffeaa7; padding: 2px 5px; border-radius: 4px; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Notes Portal: Branch Management</h2>
    
    <div class="controls">
        <input type="text" id="branchInput" placeholder="New Branch Name...">
        <button onclick="addBranch()">Add Main Branch</button>
    </div>

    <div id="portalDisplay"></div>
</div>

<script>
    // Data Structure: { branches: [], globalSubBranches: [] }
    let appData = JSON.parse(localStorage.getItem('notesAppData')) || { branches: [], globalSubBranches: [] };

    function saveData() {
        localStorage.setItem('notesAppData', JSON.stringify(appData));
        render();
    }

    function addBranch() {
        const name = document.getElementById('branchInput').value;
        if (!name) return;

        const newBranch = {
            id: Date.now(),
            name: name,
            // AUTO-INJECT: Apply all existing global sub-branches to the new branch
            subBranches: appData.globalSubBranches.map(gsb => ({ ...gsb, id: Date.now() + Math.random() }))
        };

        appData.branches.push(newBranch);
        document.getElementById('branchInput').value = '';
        saveData();
    }

    function addSubBranch(branchId) {
        const subName = prompt("Enter sub-branch name:");
        const isGlobal = confirm("Apply this to all current and future branches?");
        
        if (!subName) return;

        const subBranchObj = {
            name: subName,
            isGlobal: isGlobal,
            globalId: isGlobal ? Date.now() : null
        };

        if (isGlobal) {
            // 1. Add to Global Registry for future branches
            appData.globalSubBranches.push(subBranchObj);
            
            // 2. Add to all existing branches
            appData.branches.forEach(branch => {
                branch.subBranches.push({ ...subBranchObj, id: Date.now() + Math.random() });
            });
        } else {
            // Add only to specific branch
            const branch = appData.branches.find(b => b.id === branchId);
            branch.subBranches.push({ ...subBranchObj, id: Date.now() });
        }

        saveData();
    }

    function editSubBranch(branchId, subId, globalId) {
        const newName = prompt("Edit name:");
        if (!newName) return;

        if (globalId) {
            // Update Global Registry
            const gIdx = appData.globalSubBranches.findIndex(g => g.globalId === globalId);
            if (gIdx > -1) appData.globalSubBranches[gIdx].name = newName;

            // Update across ALL branches
            appData.branches.forEach(branch => {
                branch.subBranches.forEach(sub => {
                    if (sub.globalId === globalId) sub.name = newName;
                });
            });
        } else {
            // Update local only
            const branch = appData.branches.find(b => b.id === branchId);
            const sub = branch.subBranches.find(s => s.id === subId);
            sub.name = newName;
        }
        saveData();
    }

    function deleteBranch(id) {
        appData.branches = appData.branches.filter(b => b.id !== id);
        saveData();
    }

    function render() {
        const display = document.getElementById('portalDisplay');
        display.innerHTML = '';

        appData.branches.forEach(branch => {
            const card = document.createElement('div');
            card.className = 'branch-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>${branch.name}</h3>
                    <div>
                        <button onclick="addSubBranch(${branch.id})" style="background:#55efc4; color:#2d3436;">+ Sub-Branch</button>
                        <button onclick="deleteBranch(${branch.id})" style="background:#ff7675;">Delete</button>
                    </div>
                </div>
                <div id="subs-${branch.id}"></div>
            `;

            const subContainer = card.querySelector(`#subs-${branch.id}`);
            branch.subBranches.forEach(sub => {
                const subDiv = document.createElement('div');
                subDiv.className = 'sub-branch';
                subDiv.innerHTML = `
                    <span>${sub.name} ${sub.isGlobal ? '<span class="global-tag">Global</span>' : ''}</span>
                    <button onclick="editSubBranch(${branch.id}, ${sub.id}, ${sub.globalId})" style="background:#74b9ff; font-size:0.7rem;">Edit</button>
                `;
                subContainer.appendChild(subDiv);
            });

            display.appendChild(card);
        });
    }

    render();
</script>

</body>
</html>
