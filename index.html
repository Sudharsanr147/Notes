<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Notes Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div class="max-w-5xl mx-auto p-4">
        <header class="text-center py-6">
            <h1 class="text-3xl font-extrabold text-blue-700">Project Note Studio</h1>
            <p class="text-gray-500 text-sm mt-1">Cloud-Synced Project Management</p>
        </header>

        <nav class="flex space-x-1 bg-gray-200 p-1 rounded-xl mb-6">
            <button onclick="showSection('add')" class="nav-btn flex-1 py-2 rounded-lg font-medium bg-white shadow-sm" id="btn-add">Add Note</button>
            <button onclick="showSection('table')" class="nav-btn flex-1 py-2 rounded-lg font-medium text-gray-600" id="btn-table">All Notes</button>
            <button onclick="showSection('config')" class="nav-btn flex-1 py-2 rounded-lg font-medium text-gray-600" id="btn-config">Setup Projects</button>
        </nav>

        <main id="add-section" class="section space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Project</label>
                        <select id="projSelect" onchange="loadBranches()" class="w-full border-gray-200 border p-3 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Branch</label>
                        <select id="branchSelect" class="w-full border-gray-200 border p-3 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Sub-Branch</label>
                        <select id="subBranchSelect" class="w-full border-gray-200 border p-3 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    </div>
                </div>
                <textarea id="noteInput" rows="5" class="w-full border-gray-200 border p-4 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none mb-4" placeholder="Start typing your project notes here..."></textarea>
                <button id="saveNoteBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95">Save Note to Cloud</button>
            </div>
        </main>

        <section id="table-section" class="section hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 uppercase text-xs font-bold">
                                <th class="p-4 border-b">Project</th>
                                <th class="p-4 border-b">Branch</th>
                                <th class="p-4 border-b">Sub-Branch</th>
                                <th class="p-4 border-b">Note Content</th>
                            </tr>
                        </thead>
                        <tbody id="notesTableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="config-section" class="section hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <h3 class="font-bold text-lg mb-4 text-blue-700">Add New Project</h3>
                <div class="flex space-x-2">
                    <input id="newProjInput" type="text" placeholder="Project Name" class="flex-grow border border-gray-200 p-3 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="addProject()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-700">Create</button>
                </div>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7cPiyA9ms0fz3waIsGL8076c2AyJiJV0",
            authDomain: "project-notes-fafdc.firebaseapp.com",
            databaseURL: "https://project-notes-fafdc-default-rtdb.firebaseio.com",
            projectId: "project-notes-fafdc",
            storageBucket: "project-notes-fafdc.firebasestorage.app",
            messagingSenderId: "1098284034250",
            appId: "1:1098284034250:web:ec39919d935ed5e47e2c33"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "projects"), (snapshot) => {
            const select = document.getElementById('projSelect');
            select.innerHTML = snapshot.empty ? '<option>No Projects Found</option>' : '';
            snapshot.forEach(doc => {
                select.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`;
            });
            window.loadBranches();
        });

        window.loadBranches = () => {
            document.getElementById('branchSelect').innerHTML = `<option value="General">General</option>`;
            document.getElementById('subBranchSelect').innerHTML = `<option value="General">General</option>`;
        };

        window.saveNote = async () => {
            const noteText = document.getElementById('noteInput').value;
            const project = document.getElementById('projSelect').value;
            if(!noteText || !project) return alert("Please select a project and write a note.");
            await addDoc(collection(db, "notes"), {
                project, branch: "General", subBranch: "General",
                text: noteText, createdAt: serverTimestamp()
            });
            document.getElementById('noteInput').value = '';
            alert("Saved!");
        };
        document.getElementById('saveNoteBtn').onclick = window.saveNote;

        const q = query(collection(db, "notes"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const tbody = document.getElementById('notesTableBody');
            tbody.innerHTML = '';
            snapshot.forEach(doc => {
                const n = doc.data();
                tbody.innerHTML += `<tr><td class="p-4 font-semibold text-blue-600">${n.project}</td><td class="p-4">${n.branch}</td><td class="p-4">${n.subBranch}</td><td class="p-4">${n.text}</td></tr>`;
            });
        });

        window.addProject = async () => {
            const name = document.getElementById('newProjInput').value;
            if(!name) return;
            await addDoc(collection(db, "projects"), { name });
            document.getElementById('newProjInput').value = '';
        };
    </script>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + '-section').classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-white', 'shadow-sm', 'text-blue-700');
                b.classList.add('text-gray-600');
            });
            document.getElementById('btn-' + id).classList.add('bg-white', 'shadow-sm', 'text-blue-700');
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
